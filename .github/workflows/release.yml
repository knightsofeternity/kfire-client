name: Release

# Tag a version (e.g. v0.1.0) to build the desktop app for Windows, macOS and
# Linux and publish the installers to a GitHub Release.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            rust-targets: aarch64-apple-darwin
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
            rust-targets: x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ''
            rust-targets: ''
          - platform: windows-latest
            args: ''
            rust-targets: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libgtk-3-dev libxdo-dev libssl-dev build-essential

      - uses: pnpm/action-setup@v4
        with:
          version: 10.20.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'KFIRE Client __VERSION__'
          releaseBody: |
            KFIRE desktop client. Download the installer for your platform below.

            **On first launch:** enter your organization's KFIRE server address, then
            approve the device in the browser — no password needed.

            **Security warning?** The installers aren't code-signed yet, so your OS may
            warn about an "unknown publisher". The app is safe:
            - Windows (SmartScreen): *More info* → *Run anyway*
            - macOS (Gatekeeper): right-click the app → *Open* → *Open*
            - Linux: no warning
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
